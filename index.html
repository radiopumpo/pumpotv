<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>PumpoTV — 24/7 Live Channels</title>
  <link rel="icon" type="image/png" href="https://radiopumpo.github.io/radiopumpologo.png">
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Space+Mono:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/retro.css">
  <link rel="stylesheet" href="css/stream.css">
</head>
<body class="retro">

<!-- ── TOP NAV ── -->
<nav class="top-nav">
  <a href="https://radiopumpo.github.io" class="nav-brand">PUMPO<span>TV</span></a>
  <div class="nav-center">
    <div class="view-toggle">
      <button class="vt-btn active" data-v="retro"   onclick="App.setView('retro')">📺 Retro</button>
      <button class="vt-btn"        data-v="stream"  onclick="App.setView('stream')">🖥 Stream</button>
    </div>
    <div class="live-badge">LIVE</div>
  </div>
  <div class="nav-right">
    <button class="mute-btn" id="muteBtn" onclick="App.toggleMute()">🔇 Muted</button>
    <a href="https://radiopumpo.github.io"            class="nav-link">📻 Radio</a>
    <a href="https://radiopumpo.github.io/pumpo-tools" class="nav-link">🛠 Tools</a>
  </div>
</nav>

<!-- ── CHANNEL BAR ── -->
<div class="channel-bar" id="channelBar"></div>

<!-- ── MAIN ── -->
<div class="main">

  <!-- RETRO LAYOUT: TV + Remote side by side -->
  <div class="tv-layout">

    <!-- TV CABINET -->
    <div class="tv-cabinet">
      <div class="tv-bezel">
        <div class="tv-screen" id="tvScreen">
          <iframe id="ytRetro" allow="autoplay; encrypted-media" allowfullscreen></iframe>
          <div class="scan-lines"></div>
          <div class="static-layer"></div>
        </div>
        <div class="tv-bottom">
          <div class="tv-brand-text">PUMPO</div>
          <div class="tv-indicators">
            <div class="tv-led"></div>
            <div class="tv-knobs">
              <div class="tv-knob"></div>
              <div class="tv-knob"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="tv-stand"></div>
    </div>

    <!-- VIRTUAL REMOTE -->
    <div class="remote" id="remoteEl"></div>

  </div>

  <!-- STREAM LAYOUT: full-width player -->
  <div class="stream-layout">
    <iframe id="ytStream" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>

  <!-- ── INFO BAR ── -->
  <div class="info-bar">
    <div class="info-left">
      <div class="info-ch" id="infoCh">PumpoTV</div>
      <div class="info-title" id="infoTitle">Loading...</div>
      <div class="info-time" id="infoTime">—</div>
    </div>
    <div class="info-right">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="info-next" id="infoNext">Up next: —</div>
    </div>
  </div>

  <!-- ── EPG ── -->
  <div class="epg-section">
    <div class="epg-toggle" id="epgToggle">
      <span class="epg-toggle-label">▼ Programme Guide</span>
      <span class="epg-chevron" id="epgChevron">▼</span>
    </div>
    <div class="epg-body" id="epgBody">
      <div class="epg-tabs">
        <button class="epg-tab active" data-tab="now"      onclick="EPG.setTab('now')">Now playing</button>
        <button class="epg-tab"        data-tab="next"     onclick="EPG.setTab('next')">Up next</button>
        <button class="epg-tab"        data-tab="schedule" onclick="EPG.setTab('schedule')">Schedule</button>
      </div>
      <div class="epg-cards" id="epgCards"></div>
    </div>
  </div>

  <!-- ── PUMPO PICKS (AI CHANNEL) ── -->
  <div class="foryou-panel" id="forYouPanel" style="display:none;">
    <div class="fy-title">✨ Pumpo Picks — Tell me what you want to watch</div>

    <!-- Model toggle -->
    <div class="fy-model-toggle">
      <button class="fy-model-btn active" data-m="gemini" onclick="AIChannel.setModel('gemini')">Gemini</button>
      <button class="fy-model-btn"        data-m="claude" onclick="AIChannel.setModel('claude')">Claude</button>
    </div>

    <!-- API key -->
    <div class="fy-key-row">
      <input type="password" class="fy-key-input" id="fyKeyInput" placeholder="Paste your Gemini or Anthropic API key...">
      <button class="fy-key-save" onclick="AIChannel.saveKey(AIChannel.model)">Save</button>
    </div>

    <!-- Prompt -->
    <div class="fy-row">
      <input class="fy-input" id="fyPrompt"
        placeholder="e.g. calm cooking videos, TED talks about psychology, lo-fi music mixes..."
        onkeydown="if(event.key==='Enter') App.generateForYou()">
      <button class="fy-btn" id="fyBtn" onclick="App.generateForYou()">Generate ✦</button>
    </div>

    <div class="fy-status" id="fyStatus">
      The AI will curate a personal playlist from embeddable YouTube content based on your prompt.
      Requires a Gemini or Claude API key.
    </div>
  </div>

</div><!-- /main -->

<div class="toast" id="toastEl"></div>

<!-- ── SCRIPTS ── -->
<script src="js/player.js"></script>
<script src="js/epg.js"></script>
<script src="js/remote.js"></script>
<script src="js/ai-channel.js"></script>
<script src="js/app.js"></script>

</body>
</html>
